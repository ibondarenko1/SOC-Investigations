name: New SOC Case
description: Open a structured SOC investigation case
title: "[CASE] <short title>"
labels: ["new-case"]
body:
  - type: input
    id: case_title
    attributes:
      label: Case Title
      placeholder: "e.g. SSH Brute-Force Detection on Lab Host"
    validations:
      required: true
  - type: dropdown
    id: source
    attributes:
      label: Source / Environment
      options:
        - SierraLab Security Onion (hands-on)
        - LetsDefend SOC Analyst (training)
        - TryHackMe / HTB
        - CTF
        - Other (describe in summary)
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Low
        - Medium
        - High
        - Critical
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Executive Summary
      description: 2-4 sentences - what fired, what was investigated, what was the verdict
    validations:
      required: true
  - type: textarea
    id: timeline
    attributes:
      label: Timeline (Key Timestamps)
      placeholder: |
        - T+0  - Alert source
        - T+5m - Triage starts
        - T+30m - Verdict
    validations:
      required: true
  - type: textarea
    id: iocs
    attributes:
      label: IOCs
      placeholder: "IPs, domains, hashes, usernames (REDACT real identities)"
  - type: textarea
    id: mitre
    attributes:
      label: MITRE ATT&CK
      placeholder: "T1110.001 - Brute Force"
  - type: textarea
    id: mitigation
    attributes:
      label: Mitigation / Response Actions
  - type: textarea
    id: lessons
    attributes:
      label: Lessons Learned
